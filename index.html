<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <title>To Do List</title>
<script defer src="main.js"></script></head>
<body>
    <header>
        <nav>
            <div class="head_left">
                <div class="title">To Do List By Ignacio</div>
                <div class="search"><input type="search" placeholder="Search your task..."></div>
            </div>
            <div class="head_right">
                <div class="bell_icon"><i class="fa-solid fa-bell"></i></div>
                <div class="config"><i class="fa-solid fa-gear"></i></div>
                <div class="user_icon"><i class="fa-solid fa-user"></i></div>    
            </div>
        </nav>
    </header>

    <aside>
        <div class="conteinar_top_aside">
            <div class="logo"></div>
            <div class="text_description">My Spaces</div>
            <div class="text_subDescription">5 Folders</div>
        </div>
        <div class="task">
            <div class="box-aside box-task">Sumarry</div>
            <div class="box-aside box-task">To Do</div>
            <div class="box-aside box-task">In Progress</div>
            <div class="box-aside box-task">Done</div>
        </div>
        <div class="folder">
            <div class="box-aside box-folder">Work</div>
            <div class="box-aside box-folder">Personal</div>
            <div class="box-aside box-folder">University</div>
            <div class="box-aside box-folder">Home</div>
        </div>
        <div class="help">
            <div class="box-aside box-help">Help</div>
            <div class="box-aside box-help">GitHub Repositoy</div>
        </div>
    </aside>

</body>
</html>
